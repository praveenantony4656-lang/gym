<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/registration.css">
    <title>REGISTRATION</title>
</head>

<body>
    <div class="heading">
        <h1>REGISTRATION FORM</h1>
        <div class="form">
            <form>
                <div>
                    <div>
                        <div>
                            <label for="fname">Firstname</label>
                            <input type="text" id="fname" placeholder="frist name" required>
                        </div>
                        <div>
                            <label for="lname">Lastname</label>
                            <input type="text" id="lname" placeholder="last name" required>
                        </div>
                    </div>
                    <div>
                        <div>
                            <label for="phone">Phone</label>
                            <input type="tel" id="phone" placeholder="Phone number" required>
                        </div>
                        <div>
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="Email" required>
                        </div>
                    </div>
                    <div>
                        <div>
                            <label for="age">Age</label>
                            <input type="number" id="age" placeholder="Age" required>
                        </div>
                        <div>
                            <label for="gender">Gender</label>
                        </div>
                        <div class="gender">
                            <input type="radio" id="male" value="male" required name="gender">
                            <label for="male">male</label>
                            <input type="radio" id="female" value="female" required name="gender">
                            <label for="female">female</label>
                        </div>
                    </div>
                    <div>
                        <div>
                            <label for="street">Street</label>
                            <input type="text" id="street" placeholder="street/H.No" required>
                        </div>
                        <div>
                            <label for="city">Area</label>
                             <input type="text" placeholder="Urban/Rular" id="city" required>   
                        </div>
                        <div>
                            <label for="dis">Distric</label>
                            <input type="text" id="dis" placeholder="Chennai" required>
                        </div>
                        <div>
                            <label for="state">State</label>
                            <input type="text" id="state" placeholder="kerala" required>
                        </div>
                        <div>
                            <label for="pin">Pincode</label>
                            <input type="number" id="pin" placeholder="624201" required>
                        </div>
                    </div>
                    <div>
                        <div>
                            <label for="pass">Password</label>
                            <input type="password" id="pass" placeholder="Enter your password" required>
                        </div>
                        <div>
                            <label for="cpass">Conform Password</label>
                            <input type="password" id="cpass" placeholder="Reenter your password" required>
                        </div>
                    </div>
                    <div>
                        <button type="submit">Submit</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
